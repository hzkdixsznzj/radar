name: Daily Radar Pipeline

# Scrapes fresh Belgian tenders from TED and pushes a digest notification
# to subscribed users every morning. Free tier, more reliable than Vercel
# cron (which has 1/day limits on hobby plans and flaky execution).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
#   VAPID_EMAIL           (e.g. mailto:contact@radar.be)
#
# Optional:
#   NOTIFY_THRESHOLD      (default 70 — score cutoff for push digest)

on:
  schedule:
    # Run 4× per day so users see fresh tenders within hours of publication
    # instead of next-day. Times in UTC (BE = UTC+1 in winter, UTC+2 in summer).
    #   05:00 UTC → 6/7h local — pre-morning digest
    #   10:00 UTC → 11/12h     — catches late-morning publications
    #   14:00 UTC → 15/16h     — afternoon refresh
    #   19:00 UTC → 20/21h     — end-of-day catchup
    - cron: '0 5,10,14,19 * * *'
  workflow_dispatch: {}

concurrency:
  group: daily-radar
  cancel-in-progress: false

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
  VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
  VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
  NOTIFY_THRESHOLD: ${{ secrets.NOTIFY_THRESHOLD }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scrape TED (EU-threshold Belgian tenders, last 7 days)
        run: pnpm exec tsx src/lib/scrapers/ted-scraper.ts

      - name: Scrape BDA (Belgian sub-threshold tenders, last 7 days)
        # Covers Belgian public tenders below EU thresholds that never
        # appear in TED — the bulk of opportunities for SMEs. If this step
        # fails we still want the pipeline to continue, so `|| true` below.
        run: pnpm exec tsx src/lib/scrapers/be-scraper.ts || true

      - name: Close tenders past their deadline
        # Marks tenders with a deadline in the past as `status='closed'`
        # so the feed surface only shows live opportunities. Cheap to run
        # every cycle (~one bulk UPDATE).
        run: pnpm exec tsx scripts/cleanup-status.ts || true

      - name: Extract themes for new tenders (Claude Haiku)
        # Processes any tender whose `themes` column is still empty,
        # rate-limited at 40 RPM to stay under Anthropic Tier-1 caps.
        # Steady state: ~200-400 new tenders per cycle = 5-10 min.
        # First-time backfill of 2.5K rows takes ~1h — run manually
        # via `pnpm exec tsx scripts/backfill-themes.ts`.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm exec tsx scripts/backfill-themes.ts || true

      - name: Send daily push digest
        run: pnpm exec tsx scripts/notify.ts

      - name: Warn users about deadlines approaching
        run: pnpm exec tsx scripts/deadline-notify.ts

  # Notify the maintainer in Discord (or any webhook) when the pipeline
  # fails. Keep as a separate job so it only fires on failure — we don't
  # want a noisy channel when things are green. Requires a single
  # PIPELINE_ALERT_WEBHOOK secret (Discord/Slack/generic JSON webhook).
  notify-failure:
    needs: pipeline
    if: failure()
    runs-on: ubuntu-latest
    env:
      WEBHOOK: ${{ secrets.PIPELINE_ALERT_WEBHOOK }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Post failure alert
        # Note: secrets cannot be referenced in step-level `if:` directly
        # (GitHub Actions rejects the workflow as malformed before any job
        # can start, which is what was happening on every push). Use the
        # env var as a string compare instead.
        if: env.WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"🚨 Radar daily pipeline failed. Run: $RUN_URL\"}" \
            "$WEBHOOK" || true
